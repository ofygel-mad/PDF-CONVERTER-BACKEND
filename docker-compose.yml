# ─────────────────────────────────────────────────────────────────────────────
# Backend — standalone compose (separate repo mode)
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
#
# The API will be available at http://localhost:${API_PORT:-8000}
# Allow the frontend origin in ALLOWED_ORIGINS so CORS works.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pdf_converter}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pdf_converter}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/${MINIO_BUCKET_RAW:-raw-documents} &&
        mc mb --ignore-existing local/${MINIO_BUCKET_EXPORTS:-excel-exports} &&
        echo 'Buckets ready.'
      "

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_NAME:       ${APP_NAME:-PDF Converter API}
      ENVIRONMENT:    ${ENVIRONMENT:-production}
      API_V1_PREFIX:  /api/v1
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
      APP_HOST:       0.0.0.0
      APP_PORT:       8000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL:   postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pdf_converter}
      REDIS_URL:      redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE:     "false"
      MINIO_BUCKET_RAW:     ${MINIO_BUCKET_RAW:-raw-documents}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-excel-exports}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY:      ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api_data:/app/data          # persistent sessions, job uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command:
      - celery
      - -A
      - app.core.celery_app:celery_app
      - worker
      - --loglevel=info
      - --pool=${CELERY_POOL:-prefork}
      - --concurrency=${CELERY_CONCURRENCY:-2}
      - -Q
      - preview,celery
    environment:
      APP_NAME:       ${APP_NAME:-PDF Converter API}
      ENVIRONMENT:    ${ENVIRONMENT:-production}
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
      DATABASE_URL:   postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pdf_converter}
      REDIS_URL:      redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE:     "false"
      MINIO_BUCKET_RAW:     ${MINIO_BUCKET_RAW:-raw-documents}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-excel-exports}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY:      ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
    volumes:
      - api_data:/app/data          # shared with api so worker can read uploaded files

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_data:
